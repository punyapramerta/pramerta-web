<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <rect width="800" height="420" fill="#F8FAFF"/>
  <rect width="800" height="5" fill="#1A3EB4"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="100" fill="#1A3EB4"/>
  <text x="400" y="38" text-anchor="middle" fill="white" fill-opacity="0.6" font-size="10" font-weight="700" letter-spacing="2">PERBANDINGAN TEKNIS</text>
  <text x="400" y="68" text-anchor="middle" fill="white" font-size="30" font-weight="800">AHU vs FCU — Mana yang Tepat?</text>
  <text x="400" y="90" text-anchor="middle" fill="white" fill-opacity="0.65" font-size="12">Air Handling Unit · Fan Coil Unit</text>

  <!-- Divider line center -->
  <line x1="400" y1="110" x2="400" y2="420" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="370" y="195" width="60" height="30" rx="15" fill="#1A3EB4"/>
  <text x="400" y="215" text-anchor="middle" fill="white" font-size="11" font-weight="800">VS</text>

  <!-- AHU side -->
  <text x="80" y="138" text-anchor="middle" fill="#1A3EB4" font-size="28" font-weight="900">AHU</text>
  <text x="80" y="158" text-anchor="middle" fill="#64748B" font-size="11">Air Handling Unit</text>

  <!-- AHU diagram box -->
  <rect x="30" y="168" width="320" height="60" rx="10" fill="#EEF2FF" stroke="#1A3EB4" stroke-width="1.5"/>
  <rect x="50" y="182" width="90" height="32" rx="6" fill="#1A3EB4"/>
  <text x="95" y="202" text-anchor="middle" fill="white" font-size="9" font-weight="700">FILTER</text>
  <rect x="155" y="182" width="70" height="32" rx="6" fill="#3B5CC4"/>
  <text x="190" y="202" text-anchor="middle" fill="white" font-size="9" font-weight="700">COIL</text>
  <rect x="240" y="182" width="80" height="32" rx="6" fill="#1A3EB4"/>
  <text x="280" y="202" text-anchor="middle" fill="white" font-size="9" font-weight="700">BLOWER</text>
  <text x="130" y="218" fill="#64748B" font-size="8">→ Fresh air + recirculated air</text>

  <!-- AHU specs -->
  <text x="40" y="260" fill="#1E293B" font-size="12" font-weight="700">✓  Menangani fresh air &amp; recirculation</text>
  <text x="40" y="280" fill="#1E293B" font-size="12" font-weight="700">✓  Filter multi-stage (HEPA tersedia)</text>
  <text x="40" y="300" fill="#1E293B" font-size="12" font-weight="700">✓  Kontrol kelembapan (humidifier)</text>
  <text x="40" y="320" fill="#1E293B" font-size="12" font-weight="700">✓  Cocok pabrik, RS, cleanroom</text>
  <text x="40" y="345" fill="#94A3B8" font-size="11">✗  Instalasi lebih kompleks &amp; mahal</text>
  <text x="40" y="362" fill="#94A3B8" font-size="11">✗  Membutuhkan ruang mekanikal</text>

  <rect x="40" y="388" width="160" height="20" rx="10" fill="#EEF2FF"/>
  <text x="120" y="402" text-anchor="middle" fill="#1A3EB4" font-size="10" font-weight="700">Kapasitas: 1.000–50.000 CFM</text>

  <!-- FCU side -->
  <text x="720" y="138" text-anchor="middle" fill="#0F766E" font-size="28" font-weight="900">FCU</text>
  <text x="720" y="158" text-anchor="middle" fill="#64748B" font-size="11">Fan Coil Unit</text>

  <!-- FCU diagram box -->
  <rect x="450" y="168" width="320" height="60" rx="10" fill="#F0FDF9" stroke="#10B981" stroke-width="1.5"/>
  <rect x="470" y="182" width="80" height="32" rx="6" fill="#10B981"/>
  <text x="510" y="202" text-anchor="middle" fill="white" font-size="9" font-weight="700">FAN</text>
  <rect x="565" y="182" width="80" height="32" rx="6" fill="#059669"/>
  <text x="605" y="202" text-anchor="middle" fill="white" font-size="9" font-weight="700">COIL</text>
  <rect x="660" y="182" width="80" height="32" rx="6" fill="#10B981"/>
  <text x="700" y="202" text-anchor="middle" fill="white" font-size="9" font-weight="700">FILTER</text>
  <text x="570" y="218" fill="#64748B" font-size="8">→ Recirculated air only</text>

  <!-- FCU specs -->
  <text x="460" y="260" fill="#1E293B" font-size="12" font-weight="700">✓  Instalasi cepat &amp; fleksibel</text>
  <text x="460" y="280" fill="#1E293B" font-size="12" font-weight="700">✓  Cocok per-ruangan / per-zona</text>
  <text x="460" y="300" fill="#1E293B" font-size="12" font-weight="700">✓  Biaya investasi lebih rendah</text>
  <text x="460" y="320" fill="#1E293B" font-size="12" font-weight="700">✓  Kontrol suhu individual</text>
  <text x="460" y="345" fill="#94A3B8" font-size="11">✗  Tidak menangani fresh air</text>
  <text x="460" y="362" fill="#94A3B8" font-size="11">✗  Filtrasi terbatas</text>

  <rect x="460" y="388" width="160" height="20" rx="10" fill="#F0FDF9"/>
  <text x="540" y="402" text-anchor="middle" fill="#0F766E" font-size="10" font-weight="700">Kapasitas: 200–4.000 CFM</text>

  <text x="768" y="416" text-anchor="end" fill="#94A3B8" font-size="10" font-weight="700">PAS HVAC</text>
</svg>
